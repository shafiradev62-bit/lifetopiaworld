<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- PWA / Mobile optimized viewport — no zoom, full screen, safe area support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lifetopia" />
    <meta name="theme-color" content="#3E2723" />
    <title>Lifetopia - alpha build</title>
    <link rel="icon" type="image/png" href="/icon-Lifetopia.png" />
    <link rel="apple-touch-icon" href="/icon-Lifetopia.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; -ms-touch-action: none; }
      * { touch-action: manipulation; }
      canvas { touch-action: none; }
      #root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
      canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
      /* Landscape mobile: ensure full fit */
      @media (orientation: landscape) and (max-height: 500px) {
        #root { align-items: stretch; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (typeof globalThis.global === 'undefined') globalThis.global = globalThis;
    </script>
    <script type="module" src="/src/polyfills.ts"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
